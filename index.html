<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ゴルフ予約管理</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --green: #2e7d4f;
    --green-dark: #1f5c39;
    --bg: #f4f6f4;
    --card: #ffffff;
    --border: #dfe4df;
    --text: #26302a;
    --muted: #6b756f;
    --danger: #c0392b;
    --warn-bg: #fff4e5;
    --warn-text: #9a6400;
  }
  * { box-sizing: border-box; }
  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--green);
    color: #fff;
    padding: 20px 24px;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.9;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 15px;
    margin: 0 0 14px;
    color: var(--green-dark);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .form-grid > div {
    min-width: 0;
  }
  @media (max-width: 480px) {
    .date-time-field { grid-column: 1 / -1; }
  }
  label {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  input[type="date"], input[type="time"], input[type="text"], select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  textarea { resize: vertical; }
  .paste-status {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
  }
  .booking-reminder-info {
    background: #f0f6f0;
    border: 1px solid var(--green);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--green-dark);
    line-height: 1.7;
  }
  .status-tag {
    display: inline-block;
    font-size: 12px;
    color: #fff;
    background: var(--muted);
    padding: 2px 9px;
    border-radius: 999px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .status-tag.status-mikakutei { background: #e0a300; }
  .status-tag.status-chusenmachi { background: #c77b00; }
  .course-tag {
    display: inline-block;
    font-size: 12px;
    color: #fff;
    background: var(--green);
    padding: 2px 9px;
    border-radius: 999px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .filter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .course-filter-row, .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-chip {
    background: #eceeec;
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
  }
  .filter-chip.active { background: var(--green); color: #fff; }
  .full-width { grid-column: 1 / -1; }
  .players-col {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-size: 14px; color: var(--text); }
  .form-actions {
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    font-size: 14px;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-secondary { background: #eceeec; color: var(--text); }
  .btn-secondary:hover { background: #dde1dd; }
  .btn-danger { background: #fbe9e7; color: var(--danger); }
  .btn-danger:hover { background: #f8d7d2; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .res-list { display: flex; flex-direction: column; gap: 10px; }
  .res-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .res-main {
    min-width: 0;
    word-break: break-word;
  }
  .res-item.past { opacity: 0.55; }
  .res-main .date-line {
    font-size: 15px;
    font-weight: 600;
    color: var(--green-dark);
  }
  .res-main .sub-line {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }
  .badge {
    display: inline-block;
    background: var(--warn-bg);
    color: var(--warn-text);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
  }
  .res-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 6px;
    display: inline-block;
    text-decoration: none;
  }
  .icon-btn:hover { background: #f0f1f0; }
  .icon-btn.delete:hover { color: var(--danger); border-color: var(--danger); }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 30px 0;
    font-size: 13px;
  }
  .gcal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .gcal-status {
    font-size: 13px;
    color: var(--muted);
  }
  .gcal-status.connected { color: var(--green-dark); font-weight: 600; }
  .gcal-actions { display: flex; gap: 8px; }
  .sync-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--green-dark);
    background: #e6f2ea;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
  }
  .sync-tag.sync-tag-danger {
    color: var(--danger);
    background: #fbe9e7;
  }
  .sync-tag.sync-tag-orange {
    color: #e65100;
    background: #ffe0b2;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
  }
  .modal-box {
    background: #fff;
    border-radius: 10px;
    padding: 22px 20px;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
  }
  .modal-message {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 18px;
    text-align: center;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .modal-actions button {
    flex: 1;
  }
  #playDateFieldWrap {
    position: relative;
  }
  .date-picker-btn {
    width: 100%;
    text-align: left;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
  }
  .calendar-popup {
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    padding: 10px;
    width: 260px;
    z-index: 900;
  }
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--green-dark);
  }
  .calendar-header button {
    background: none;
    padding: 4px 10px;
    color: var(--green-dark);
    font-size: 16px;
  }
  .calendar-header button:hover {
    background: #f0f1f0;
  }
  .calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 4px;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .calendar-day {
    background: none;
    border: none;
    padding: 8px 0;
    font-size: 13px;
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
  }
  .calendar-day:hover { background: #f0f1f0; }
  .calendar-day.other-month { color: #c7ccc8; }
  .calendar-day.today { font-weight: 700; color: var(--green-dark); }
  .calendar-day.selected { background: var(--green); color: #fff; }
  .calendar-day.empty { visibility: hidden; cursor: default; }
  #reservationFormCard.no-course-selected .course-gate {
    display: none !important;
  }
  .month-calendar { margin-top: 14px; }
  .month-calendar .calendar-header { margin-bottom: 6px; }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .month-day {
    min-height: 62px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
    font-size: 11px;
    overflow: hidden;
  }
  .month-day.other-month { background: #f7f8f7; color: #c7ccc8; }
  .month-day.today { border-color: var(--green-dark); border-width: 2px; }
  .month-day-num { font-weight: 600; margin-bottom: 2px; }
  .month-day-res {
    background: var(--green);
    color: #fff;
    border-radius: 4px;
    padding: 1px 3px;
    margin-bottom: 2px;
    font-size: 10px;
    line-height: 1.4;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .month-day-res:hover { opacity: 0.85; }
  @media (max-width: 480px) {
    .month-day { min-height: 44px; padding: 2px; font-size: 10px; }
    .month-day-res { font-size: 9px; padding: 1px 2px; }
  }
</style>
</head>
<body>

<header>
  <h1>ゴルフ予約管理</h1>
</header>

<main>
  <div class="card">
    <h2>Googleカレンダー連携</h2>
    <div class="gcal-row">
      <div class="gcal-status" id="gcalStatus">未接続です</div>
      <div class="gcal-actions">
        <button class="btn-secondary" id="gcalConnectBtn">Googleカレンダーに接続</button>
        <button class="btn-secondary" id="gcalSyncBtn" style="display:none;">Googleカレンダー同期</button>
      </div>
    </div>
  </div>

  <div class="card no-course-selected" id="reservationFormCard">
    <h2 id="form-title">予約を追加</h2>
    <div class="form-grid">
      <div class="full-width" id="yokohamaPasteWrap" style="display:none;">
        <label for="yokohamaPasteText">横浜CCの予約確認テキストを貼り付けて自動入力（任意）</label>
        <textarea id="yokohamaPasteText" rows="3"></textarea>
        <button type="button" class="btn-secondary" id="yokohamaPasteParseBtn" style="margin-top:6px;">解析して反映</button>
        <span class="paste-status" id="yokohamaPasteStatus"></span>
      </div>
      <div class="full-width" id="pacificPasteWrap" style="display:none;">
        <label for="pacificPasteText">太平洋クラブの予約確認テキストを貼り付けて自動入力（任意）</label>
        <textarea id="pacificPasteText" rows="3"></textarea>
        <button type="button" class="btn-secondary" id="pacificPasteParseBtn" style="margin-top:6px;">解析して反映</button>
        <span class="paste-status" id="pacificPasteStatus"></span>
      </div>
      <div class="full-width">
        <label for="courseSelect">ゴルフ場</label>
        <select id="courseSelect">
          <option value="">選択</option>
          <option value="横浜CC">横浜CC</option>
          <option value="チェックメイトCC">チェックメイトCC</option>
          <option value="太平洋クラブ">太平洋クラブ</option>
          <option value="__custom__">その他（自由入力）</option>
        </select>
      </div>
      <div class="full-width" id="courseCustomWrap" style="display:none;">
        <label for="courseCustom">ゴルフ場名を入力</label>
        <input type="text" id="courseCustom" placeholder="例: 〇〇カントリークラブ">
      </div>
      <div class="full-width course-gate" id="pacificBranchWrap" style="display:none;">
        <label for="pacificBranchSelect">コース</label>
        <select id="pacificBranchSelect">
          <option value="">選択</option>
          <option value="御殿場">御殿場</option>
          <option value="御殿場WEST">御殿場WEST</option>
          <option value="佐野">佐野</option>
          <option value="美野里">美野里</option>
          <option value="成田">成田</option>
          <option value="八千代">八千代</option>
          <option value="市原">市原</option>
          <option value="軽井沢">軽井沢</option>
          <option value="相模">相模</option>
          <option value="江南">江南</option>
          <option value="大洗">大洗</option>
          <option value="益子">益子</option>
          <option value="ロイヤル">ロイヤル</option>
          <option value="__custom__">その他</option>
        </select>
      </div>
      <div class="full-width course-gate" id="pacificBranchCustomWrap" style="display:none;">
        <label for="pacificBranchCustom">支店名を入力</label>
        <input type="text" id="pacificBranchCustom" placeholder="例: 〇〇コース">
      </div>
      <div class="full-width course-gate" id="yokohamaCourseWrap" style="display:none;">
        <label for="yokohamaCourseSelect">コース</label>
        <select id="yokohamaCourseSelect">
          <option value="">選択</option>
          <option value="西">西</option>
          <option value="東">東</option>
        </select>
      </div>
      <div class="full-width course-gate" id="courseNameWrap">
        <label for="courseNameInput">コース名</label>
        <input type="text" id="courseNameInput" placeholder="例: 東コース、西コースなど">
      </div>
      <div class="full-width course-gate" id="bookingSiteWrap" style="display:none;">
        <label for="bookingSiteSelect">予約サイト</label>
        <select id="bookingSiteSelect">
          <option value="">選択</option>
          <option value="GORA">GORA</option>
          <option value="GDO">GDO</option>
          <option value="公式HP">公式HP</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="full-width course-gate" id="goraPasteWrap" style="display:none;">
        <label for="goraPasteText">GORAの予約確認テキストを貼り付けて自動入力（任意）</label>
        <textarea id="goraPasteText" rows="3"></textarea>
        <button type="button" class="btn-secondary" id="goraPasteParseBtn" style="margin-top:6px;">解析して反映</button>
        <span class="paste-status" id="goraPasteStatus"></span>
      </div>
      <div class="date-time-field course-gate" id="playDateFieldWrap">
        <label for="playDateButton">プレー日</label>
        <button type="button" id="playDateButton" class="date-picker-btn">日付を選択</button>
        <input type="hidden" id="playDate">
        <div class="calendar-popup" id="playDateCalendar" style="display:none;">
          <div class="calendar-header">
            <button type="button" id="calPrevMonth" aria-label="前の月">‹</button>
            <span id="calMonthLabel"></span>
            <button type="button" id="calNextMonth" aria-label="次の月">›</button>
          </div>
          <div class="calendar-weekdays">
            <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span>
          </div>
          <div class="calendar-grid" id="calGrid"></div>
        </div>
      </div>
      <div class="date-time-field course-gate" id="startTimeWrap">
        <label for="startTime">スタート時間</label>
        <input type="time" id="startTime" min="05:00" max="15:00">
      </div>
      <div class="date-time-field course-gate" id="startTimeSelectWrap" style="display:none;">
        <label for="startTimeSelect">スタート時間</label>
        <select id="startTimeSelect">
          <option value="">選択</option>
          <option value="06:00">6:00</option>
          <option value="06:06">6:06</option>
          <option value="06:12">6:12</option>
          <option value="06:18">6:18</option>
          <option value="06:24">6:24</option>
          <option value="06:30">6:30</option>
          <option value="06:36">6:36</option>
          <option value="06:42">6:42</option>
          <option value="06:48">6:48</option>
          <option value="06:54">6:54</option>
          <option value="07:00">7:00</option>
          <option value="07:06">7:06</option>
          <option value="07:12">7:12</option>
          <option value="07:18">7:18</option>
          <option value="07:24">7:24</option>
          <option value="07:30">7:30</option>
          <option value="07:36">7:36</option>
          <option value="07:42">7:42</option>
          <option value="07:48">7:48</option>
          <option value="07:54">7:54</option>
          <option value="08:00">8:00</option>
          <option value="08:06">8:06</option>
          <option value="08:12">8:12</option>
          <option value="08:18">8:18</option>
          <option value="08:24">8:24</option>
          <option value="08:30">8:30</option>
          <option value="08:36">8:36</option>
          <option value="08:42">8:42</option>
          <option value="08:48">8:48</option>
          <option value="08:54">8:54</option>
          <option value="09:00">9:00</option>
          <option value="09:06">9:06</option>
          <option value="09:12">9:12</option>
          <option value="09:18">9:18</option>
          <option value="09:24">9:24</option>
          <option value="09:30">9:30</option>
          <option value="09:36">9:36</option>
          <option value="09:42">9:42</option>
          <option value="09:48">9:48</option>
          <option value="09:54">9:54</option>
          <option value="10:00">10:00</option>
          <option value="10:06">10:06</option>
          <option value="10:12">10:12</option>
          <option value="10:18">10:18</option>
          <option value="10:24">10:24</option>
          <option value="10:30">10:30</option>
          <option value="10:36">10:36</option>
          <option value="10:42">10:42</option>
          <option value="10:48">10:48</option>
          <option value="10:54">10:54</option>
        </select>
      </div>
      <div class="date-time-field course-gate" id="yokohamaNishiTimeWrap" style="display:none;">
        <label for="yokohamaNishiTimeSelect">スタート時間</label>
        <select id="yokohamaNishiTimeSelect">
          <option value="">選択</option>
          <option value="06:36">6:36</option>
          <option value="06:44">6:44</option>
          <option value="06:52">6:52</option>
          <option value="07:00">7:00</option>
          <option value="07:08">7:08</option>
          <option value="07:16">7:16</option>
          <option value="07:24">7:24</option>
          <option value="07:32">7:32</option>
          <option value="07:40">7:40</option>
          <option value="07:48">7:48</option>
          <option value="07:56">7:56</option>
          <option value="08:04">8:04</option>
          <option value="08:12">8:12</option>
          <option value="08:20">8:20</option>
          <option value="08:28">8:28</option>
          <option value="08:36">8:36</option>
          <option value="08:44">8:44</option>
          <option value="08:52">8:52</option>
          <option value="09:00">9:00</option>
          <option value="09:08">9:08</option>
          <option value="09:16">9:16</option>
          <option value="09:24">9:24</option>
          <option value="09:32">9:32</option>
          <option value="09:40">9:40</option>
          <option value="__custom__">その他</option>
        </select>
      </div>
      <div class="date-time-field course-gate" id="yokohamaNishiTimeCustomWrap" style="display:none;">
        <label for="yokohamaNishiTimeCustom">スタート時間を入力</label>
        <input type="time" id="yokohamaNishiTimeCustom">
      </div>
      <div class="date-time-field course-gate" id="pacificTimeWrap" style="display:none;">
        <label for="pacificTimeSelect">スタート時間</label>
        <select id="pacificTimeSelect">
          <option value="">選択</option>
          <option value="07:11">7:11</option>
          <option value="07:18">7:18</option>
          <option value="07:25">7:25</option>
          <option value="07:32">7:32</option>
          <option value="07:39">7:39</option>
          <option value="07:46">7:46</option>

const PACIFIC_CLUB_NAME = "太平洋クラブ";
const YOKOHAMA_CC_NAME = "横浜CC";
const CHECKMATE_CC_NAME = "チェックメイトCC";

// ---- 予約開始日（抽選・受付開始）の自動計算とリマインダー ----
// 「Nヶ月前の同日」計算は、JSのDateコンストラクタが日付オーバーフロー時に
// 自動的に翌月へ繰り越してくれる仕様をそのまま利用している
// （例: 7月31日の1ヶ月前 = 6月31日 → 6月は30日までなので自動的に7月1日になる）
function pad2n(n) { return String(n).padStart(2, "0"); }

function dateTimeLabel(d) {
  const days = ["日", "月", "火", "水", "木", "金", "土"];
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）${pad2n(d.getHours())}:${pad2n(d.getMinutes())}`;
}

function dateOnlyLabel(d) {
  const days = ["日", "月", "火", "水", "木", "金", "土"];
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

// プレー日・ゴルフ場から、予約開始日時のリマインダー一覧を計算する。
// クラブごとのルールをここに定義しており、将来的に他クラブを追加する場合はここに追記する。
function computeBookingReminders(course, playDateStr) {
  if (!course || !playDateStr) return [];
  const playDate = new Date(playDateStr + "T00:00:00");
  const dateLabel = formatDateLabel(playDateStr);

  if (course === YOKOHAMA_CC_NAME) {
    const entryDateTime = new Date(playDate);
    entryDateTime.setDate(entryDateTime.getDate() - 7 * 6);
    entryDateTime.setHours(10, 0, 0, 0);
    const firstComeDateTime = new Date(playDate);
    firstComeDateTime.setDate(firstComeDateTime.getDate() - 7 * 4);
    firstComeDateTime.setHours(10, 0, 0, 0);
    return [
      { key: "entry", label: "抽選申込開始", allDay: false, start: entryDateTime, title: `横浜CC 抽選申込開始（${dateLabel}プレー分）` },
      { key: "firstCome", label: "先着予約開始", allDay: false, start: firstComeDateTime, title: `横浜CC 先着予約開始（${dateLabel}プレー分）` }
    ];
  }

  if (course === CHECKMATE_CC_NAME) {
    const dow = playDate.getDay(); // 0=日, 6=土
    const isWeekend = dow === 0 || dow === 6;
    const monthsBefore = isWeekend ? 1 : 2;
    const openDate = new Date(playDate.getFullYear(), playDate.getMonth() - monthsBefore, playDate.getDate(), 10, 0, 0, 0);
    return [
      { key: "open", label: "予約開始", allDay: false, start: openDate, title: `チェックメイトCC 予約開始（${dateLabel}プレー分）` }
    ];
  }

  if (course === PACIFIC_CLUB_NAME) {
    const openDate = new Date(playDate.getFullYear(), playDate.getMonth() - 3, playDate.getDate(), 10, 0, 0, 0);
    return [
      { key: "open", label: "予約開始", allDay: false, start: openDate, title: `太平洋クラブ 予約開始（${dateLabel}プレー分）` }
    ];
  }

  return [];
}

function updateBookingReminderInfoUI() {
  const status = reservationStatusSelect.value;
  const playDateStr = document.getElementById("playDate").value;
  const course = getCourseValue();
  if (status === "確定" || !playDateStr) {
    bookingReminderInfoWrap.style.display = "none";
    bookingReminderInfoWrap.innerHTML = "";
    return;
  }
  const reminders = computeBookingReminders(course, playDateStr);
  if (reminders.length === 0) {
    bookingReminderInfoWrap.style.display = "none";
    bookingReminderInfoWrap.innerHTML = "";
    return;
  }
  const lines = reminders.map(r => {
    const when = r.allDay ? dateOnlyLabel(r.date) : dateTimeLabel(r.start);
    return `${r.label}: ${when}`;
  });
  bookingReminderInfoWrap.className = "full-width course-gate booking-reminder-info";
  bookingReminderInfoWrap.innerHTML = lines.join("<br>");
  bookingReminderInfoWrap.style.display = "block";
}

function updateCourseNameUI() {

function updateStartTimeUI() {

    yokohamaNishiTimeCustomWrap.style.display = "none";
    pacificTimeCustomWrap.style.display = "none";

}

function getStartTimeValue() {
  if (courseSelect.value === CHECKMATE_CC_NAME) {
    return startTimeSelect.value;
  }
  if (courseSelect.value === YOKOHAMA_CC_NAME && yokohamaCourseSelect.value === "西") {
    if (yokohamaNishiTimeSelect.value === "__custom__") {
      return yokohamaNishiTimeCustomInput.value;
    }
    return yokohamaNishiTimeSelect.value;
  }
  if (courseSelect.value === PACIFIC_CLUB_NAME) {
    if (pacificTimeSelect.value === "__custom__") {
      return pacificTimeCustomInput.value;
    }
    return pacificTimeSelect.value;
  }
  return startTimeInput.value;
}

function setStartTimeValue(value) {
  startTimeInput.value = "";
  startTimeSelect.value = "";
  yokohamaNishiTimeSelect.value = "";
  yokohamaNishiTimeCustomInput.value = "";
  yokohamaNishiTimeCustomWrap.style.display = "none";
  pacificTimeSelect.value = "";
  pacificTimeCustomInput.value = "";
  pacificTimeCustomWrap.style.display = "none";
  if (courseSelect.value === CHECKMATE_CC_NAME) {
    startTimeSelect.value = value || "";
  } else if (courseSelect.value === YOKOHAMA_CC_NAME && yokohamaCourseSelect.value === "西") {
    const presetValues = Array.from(yokohamaNishiTimeSelect.options).map(o => o.value);
    if (value && presetValues.includes(value)) {
      yokohamaNishiTimeSelect.value = value;
    } else if (value) {
      yokohamaNishiTimeSelect.value = "__custom__";
      yokohamaNishiTimeCustomInput.value = value;
      yokohamaNishiTimeCustomWrap.style.display = "block";
    }
  } else if (courseSelect.value === PACIFIC_CLUB_NAME) {
    const presetValues = Array.from(pacificTimeSelect.options).map(o => o.value);
    if (value && presetValues.includes(value)) {
      pacificTimeSelect.value = value;
    } else if (value) {
      pacificTimeSelect.value = "__custom__";
      pacificTimeCustomInput.value = value;
      pacificTimeCustomWrap.style.display = "block";
    }
  } else {
    startTimeInput.value = value || "";
  }
}

// 新規予約作成時、現在時刻ではなく7:00(またはそれに一番近い選択肢)を初期値にする
const DEFAULT_START_TIME = "07:00";

    courseCustomInput.value = "";
  } else if (courseName) {
    courseSelect.value = "__custom__";
    courseCustomInput.value = courseName;
    courseCustomWrap.style.display = "block";
  } else {
    courseSelect.value = "";
    courseCustomInput.value = "";
    courseCustomWrap.style.display = "none";
  }
  updateCourseNameUI();
  updateStartTimeUI();
  updateStartNineUI();
  updateCourseGateUI();
  renderFrequentPlayers();
  updateBookingReminderInfoUI();

function getCourseNameValue() {
  if (courseSelect.value === PACIFIC_CLUB_NAME) {
    if (pacificBranchSelect.value === "__custom__") {
      return pacificBranchCustomInput.value.trim();
    }
    return pacificBranchSelect.value;
  }
  if (courseSelect.value === YOKOHAMA_CC_NAME) {
    return yokohamaCourseSelect.value;
  }
  if (courseSelect.value === CHECKMATE_CC_NAME) {
    return "";
  }
  return courseNameInput.value.trim();
}

function setCourseNameValue(courseNameValue) {
  courseNameInput.value = "";
  pacificBranchSelect.value = "";
  pacificBranchCustomInput.value = "";
  pacificBranchCustomWrap.style.display = "none";
  yokohamaCourseSelect.value = "";
  if (courseSelect.value === PACIFIC_CLUB_NAME) {
    const presetBranches = Array.from(pacificBranchSelect.options).map(o => o.value);
    if (courseNameValue && presetBranches.includes(courseNameValue)) {
      pacificBranchSelect.value = courseNameValue;
    } else if (courseNameValue) {
      pacificBranchSelect.value = "__custom__";
      pacificBranchCustomInput.value = courseNameValue;
      pacificBranchCustomWrap.style.display = "block";
    }
  } else if (courseSelect.value === YOKOHAMA_CC_NAME) {
    const presetCourses = Array.from(yokohamaCourseSelect.options).map(o => o.value);
    if (courseNameValue && presetCourses.includes(courseNameValue)) {
      yokohamaCourseSelect.value = courseNameValue;
    }
  } else if (courseSelect.value === CHECKMATE_CC_NAME) {
    // チェックメイトCCはコース名の選択が不要
  } else {
    courseNameInput.value = courseNameValue || "";

// ---- 横浜CC予約確認テキストの貼り付け解析（任意機能） ----
// 横浜CCの会員ページ（ログインが必要なため自動取得はできない）から
// 予約確認テキストを手動でコピー＆ペーストしてもらい、フォームへ自動反映する。
// 例:
// スタート枠　スタート時間　コース　プレイヤー名
// 1組目　9時16分　西 OUT
// 定国　直樹
// 馬場　康次
const OWN_NAME_NORMALIZED = "定国直樹"; // 同伴者リストから自分の名前を除外するため

function normalizeName(name) {
  return (name || "").replace(/[\s　]+/g, "");
}

function parseYokohamaPasteText(rawText) {
  const lines = (rawText || "").split(/\r?\n/)
    .map(l => l.trim())
    .filter(l => l.length > 0)
    .filter(l => !(l.includes("スタート枠") && l.includes("プレイヤー名")));
  if (lines.length === 0) return null;

  const firstLine = lines[0];
  const timeMatch = firstLine.match(/(\d{1,2})時(\d{1,2})分/);
  const courseMatch = firstLine.match(/(西|東)\s*(OUT|IN)/);

  const time = timeMatch ? `${timeMatch[1].padStart(2, "0")}:${timeMatch[2].padStart(2, "0")}` : "";
  const side = courseMatch ? courseMatch[1] : "";
  const nine = courseMatch ? courseMatch[2] : "";

  const fields = firstLine.split("\t").map(s => s.trim()).filter(s => s.length > 0);
  const players = [];
  if (fields.length >= 4) {
    players.push(fields[fields.length - 1]);
  }
  for (let i = 1; i < lines.length; i++) {
    players.push(lines[i]);
  }
  const companions = players
    .map(p => p.trim())
    .filter(p => p.length > 0 && normalizeName(p) !== OWN_NAME_NORMALIZED);

  return { time, side, nine, companions };
}

function applyYokohamaPasteResult(parsed) {
  setCourseValue(YOKOHAMA_CC_NAME);
  if (parsed.side) {
    yokohamaCourseSelect.value = parsed.side;
    updateStartTimeUI();
  }
  if (parsed.nine) {
    setStartNineValue(parsed.nine);
  }
  if (parsed.time) {
    setStartTimeValue(parsed.time);
  }
  parsed.companions.slice(0, 3).forEach((name, i) => {
    const input = document.getElementById(`player${i + 1}`);
    if (input) input.value = name;
  });
}

document.getElementById("yokohamaPasteParseBtn").addEventListener("click", () => {
  const textarea = document.getElementById("yokohamaPasteText");
  const statusEl = document.getElementById("yokohamaPasteStatus");
  const parsed = parseYokohamaPasteText(textarea.value);
  if (!parsed || (!parsed.time && !parsed.side && !parsed.nine && parsed.companions.length === 0)) {
    statusEl.textContent = "解析できませんでした。テキスト形式をご確認ください。";
    statusEl.style.color = "var(--danger)";
    return;
  }
  applyYokohamaPasteResult(parsed);
  statusEl.textContent = "反映しました。プレー日は別途選択してください。";
  statusEl.style.color = "var(--green-dark)";
});

// ---- 太平洋クラブ予約確認テキストの貼り付け解析（任意機能） ----
// 太平洋クラブの会員ページ（ログインが必要なため自動取得はできない）から
// 予約確認テキストを手動でコピー＆ペーストしてもらい、フォームへ自動反映する。
function toHalfWidth(str) {
  return (str || "")
    .replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    .replace(/　/g, " ");
}

function parsePacificPasteText(rawText) {
  const text = rawText || "";
  const halfWidthText = toHalfWidth(text);

  const branchMatch = text.match(/^コース[\t　\s]+(.+)$/m);
  const branch = branchMatch ? branchMatch[1].trim() : "";

  const dateMatch = text.match(/プレー日[\t　\s]+(\d{4})年(\d{1,2})月(\d{1,2})日/);
  const playDate = dateMatch
    ? `${dateMatch[1]}-${dateMatch[2].padStart(2, "0")}-${dateMatch[3].padStart(2, "0")}`
    : "";

  // 「スタート時間」の行だけを対象にOUT/IN・時刻を読み取る
  // （備考欄などに含まれる別の時刻表記（例:前日17:00まで）を誤って拾わないようにするため）
  const startLineMatch = text.match(/^スタート時間[\t　\s]+(.+)$/m);
  const startLineHalf = startLineMatch ? toHalfWidth(startLineMatch[1]) : "";
  const nineMatch = startLineHalf.match(/\b(OUT|IN)\b/);
  const nine = nineMatch ? nineMatch[1] : "";

  const timeMatch = startLineHalf.match(/(\d{1,2}):(\d{2})/);
  const time = timeMatch ? `${timeMatch[1].padStart(2, "0")}:${timeMatch[2].padStart(2, "0")}` : "";

  const nameMatches = [...text.matchAll(/^お名前[\t　\s]+([^\n（(]+)/gm)];
  const companions = nameMatches
    .map(m => m[1].trim())
    .filter(n => n.length > 0 && normalizeName(n) !== OWN_NAME_NORMALIZED);

  const noCaddie = /キャディなし/.test(text);

  return { branch, playDate, nine, time, companions, noCaddie };
}

function applyPacificPasteResult(parsed) {
  setCourseValue(PACIFIC_CLUB_NAME);
  if (parsed.branch) {
    setCourseNameValue(parsed.branch);
  }
  if (parsed.nine) {
    setStartNineValue(parsed.nine);
  }
  if (parsed.time) {
    setStartTimeValue(parsed.time);
  }
  if (parsed.playDate) {
    setPlayDateValue(parsed.playDate);
  }
  if (parsed.noCaddie) {
    caddieTypeSelect.value = "セルフ";
  }
  parsed.companions.slice(0, 3).forEach((name, i) => {
    const input = document.getElementById(`player${i + 1}`);
    if (input) input.value = name;
  });
}

// ---- GORA予約確認テキストの貼り付け解析（ゴルフ場「その他」×予約サイト「GORA」の場合のみ表示） ----
function parseGoraPasteText(rawText) {
  const text = rawText || "";

  const courseMatch = text.match(/ゴルフ場名[\t　\s]+(.+)/);
  const courseNameValue = courseMatch ? courseMatch[1].trim() : "";

  const dateMatch = text.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  const playDate = dateMatch
    ? `${dateMatch[1]}-${dateMatch[2].padStart(2, "0")}-${dateMatch[3].padStart(2, "0")}`
    : "";

  const halfWidthText = toHalfWidth(text);
  const nineMatch = halfWidthText.match(/\b(OUT|IN)\b/);
  const nine = nineMatch ? nineMatch[1] : "";
  const timeMatch = halfWidthText.match(/(\d{1,2}):(\d{2})/);
  const time = timeMatch ? `${timeMatch[1].padStart(2, "0")}:${timeMatch[2].padStart(2, "0")}` : "";

  // 「同伴者・代表者」以降のプレーヤー一覧ブロックだけを対象に氏名を抽出する
  // （それより前の見出し部分に同じ「IN/OUT+時刻」表記が出るケースを避けるため）
  const rosterIdx = text.search(/同伴者・代表者|同伴者氏名/);
  const rosterText = rosterIdx >= 0 ? text.slice(rosterIdx) : text;
  const rosterLines = rosterText.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);

  const names = [];
  let collecting = false;
  rosterLines.forEach(line => {
    const halfLine = toHalfWidth(line);
    if (/(OUT|IN)\s*\d{1,2}:\d{2}/.test(halfLine)) {
      collecting = true;
      const parts = line.split("\t").map(s => s.trim()).filter(s => s.length > 0);
      const last = parts[parts.length - 1];
      if (last && /さん$/.test(last) && !/(OUT|IN)\s*\d{1,2}:\d{2}/.test(toHalfWidth(last))) {
        names.push(last.replace(/さん$/, "").trim());
      }
      return;
    }
    if (!collecting) return;
    if (/代表者|氏名|フリガナ|メールアドレス|郵便番号|電話番号|緊急連絡先/.test(line)) {
      collecting = false;
      return;
    }
    if (/さん$/.test(line)) {
      names.push(line.replace(/さん$/, "").trim());
    }
  });

  const companions = names
    .map(n => n.trim())
    .filter(n => n.length > 0 && normalizeName(n) !== OWN_NAME_NORMALIZED);

  return { courseNameValue, playDate, nine, time, companions };
}

function applyGoraPasteResult(parsed) {
  if (parsed.courseNameValue) {
    courseCustomInput.value = parsed.courseNameValue;
  }
  if (parsed.nine) {
    setStartNineValue(parsed.nine);
  }
  if (parsed.time) {
    setStartTimeValue(parsed.time);
  }
  if (parsed.playDate) {
    setPlayDateValue(parsed.playDate);
  }
  parsed.companions.slice(0, 3).forEach((name, i) => {
    const input = document.getElementById(`player${i + 1}`);
    if (input) input.value = name;
  });
}

const GOOGLE_CLIENT_ID = "477050098248-osleutait6uvk1a7b14npjtjohdiu0q2.apps.googleusercontent.com";
const GOOGLE_SCOPE = "https://www.googleapis.com/auth/calendar.events";
const GCAL_ROUND_HOURS = 6; // ゴルフ1ラウンドの想定所要時間（カレンダー表示用）
let gcalToken = null;
let gcalTokenClient = null;
let lastSyncFailed = false;

function updateGcalStatusUI() {

    statusEl.classList.remove("connected");

const GCAL_EVER_CONNECTED_KEY = "gcal_ever_connected";
let autoConnectAttempted = false;

function initGoogleAuth() {
  if (typeof google === "undefined" || !google.accounts) {
    setTimeout(initGoogleAuth, 300);
    return;
  }
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPE,
    callback: (resp) => {
      if (resp.error) {
        // 自動再接続の試みが失敗しても、初回接続時と違って無言で諦める
        // （毎回アラートが出ると煩わしいため、手動の「接続」ボタンで再試行してもらう）
        if (!autoConnectAttempted) {
          alert("Googleカレンダーへの接続に失敗しました: " + resp.error);
        }
        autoConnectAttempted = false;
        return;
      }
      autoConnectAttempted = false;
      localStorage.setItem(GCAL_EVER_CONNECTED_KEY, "true");
      gcalToken = resp.access_token;
      updateGcalStatusUI();
      syncFromCalendar();
    }
  });

  // 以前このブラウザで接続に成功したことがあれば、ページを開いた際に
  // 自動で（サイレントに）再接続を試みる。うまくいけば毎回の手動接続が不要になる。
  // ブラウザのポップアップ制御によっては失敗することもあり、その場合は
  // 従来通り「Googleカレンダーに接続」ボタンから手動で接続してもらう。
  if (localStorage.getItem(GCAL_EVER_CONNECTED_KEY) === "true") {
    autoConnectAttempted = true;
    gcalTokenClient.requestAccessToken({ prompt: "" });
  }
}

function playersLine(r) {
  const players = (r.players || [r.companions || ""]).filter(n => n && n.trim());
  return players.length ? players.join("、") : "なし";
}

function toEventResource(r) {
  const status = r.status || "確定";
  const courseName = r.course && r.course.trim() ? r.course.trim() : "ゴルフ場未設定";
  const summaryParts = [courseName];
  if (r.courseName && r.courseName.trim()) summaryParts.push(r.courseName.trim());
  if (r.startNine) summaryParts.push(r.startNine);
  let description = `ゴルフ場: ${courseName}`;
  description += `\nコース名: ${r.courseName && r.courseName.trim() ? r.courseName.trim() : "なし"}`;
  if (r.bookingSite) description += `\n予約サイト: ${r.bookingSite}`;
  description += `\nステータス: ${status}`;
  description += `\nスタート: ${r.startNine || "未設定"}`;
  description += `\nキャディ: ${r.caddieType || "未設定"}`;
  description += `\nプレーヤー: ${playersLine(r)}`;
  description += `\n組み合わせ枠: ${r.comboSlot ? "あり" : "なし"}`;
  description += `\n登録完了: ${r.registrationComplete ? "あり" : "なし"}`;
  description += `\n自分の予約枠ではない: ${r.notOwnSlot ? "あり" : "なし"}`;
  description += `\n競技: ${r.competition ? "あり" : "なし"}`;
  if (r.timeChangeRequested) {
    description += `\n時間変更依頼: ${r.timeChangeNote || "あり"}`;
  }

  let summary = r.startTime ? `${summaryParts.join(" ")} ${r.startTime}〜` : summaryParts.join(" ");
  if (r.comboSlot) {
    summary += "（組み合わせ枠）";
  }
  if (r.registrationComplete) {
    summary += "（登録済）";
  }
  if (r.notOwnSlot) {
    summary += "（招待枠）";
  }
  if (status === "未予約") {
    summary += "（未予約）";
  } else if (status === "抽選待") {
    summary += "（抽選待）";
  }
  if (r.competition) {
    summary += "（競技）";
  }

  const pad = n => String(n).padStart(2, "0");

  if (!r.startTime) {
    // スタート時間未定（未予約・抽選待などの仮予定）は終日イベントとして登録する
    const start = new Date(r.playDate + "T00:00:00");
    const end = new Date(start);
    end.setDate(end.getDate() + 1);
    const startDateStr = `${start.getFullYear()}-${pad(start.getMonth() + 1)}-${pad(start.getDate())}`;
    const endDateStr = `${end.getFullYear()}-${pad(end.getMonth() + 1)}-${pad(end.getDate())}`;
    return {
      summary,
      description,
      start: { date: startDateStr },
      end: { date: endDateStr },
      extendedProperties: { private: { checkmateccApp: "true" } }
    };
  }

  const startDateTime = `${r.playDate}T${r.startTime}:00`;
  const end = new Date(`${r.playDate}T${r.startTime}:00`);
  end.setHours(end.getHours() + GCAL_ROUND_HOURS);
  const endDateTime = `${end.getFullYear()}-${pad(end.getMonth() + 1)}-${pad(end.getDate())}T${pad(end.getHours())}:${pad(end.getMinutes())}:00`;
  return {
    summary,
    description,
    start: { dateTime: startDateTime, timeZone: "Asia/Tokyo" },
    end: { dateTime: endDateTime, timeZone: "Asia/Tokyo" },
    extendedProperties: { private: { checkmateccApp: "true" } }
  };
}

async function pushToCalendar(reservation) {
  if (!gcalToken) return reservation.gcalEventId || null;
  const event = toEventResource(reservation);
  const url = reservation.gcalEventId
    ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${reservation.gcalEventId}`
    : `https://www.googleapis.com/calendar/v3/calendars/primary/events`;
  const method = reservation.gcalEventId ? "PATCH" : "POST";
  try {
    const res = await fetch(url, {
      method,
      headers: {
        "Authorization": `Bearer ${gcalToken}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(event)
    });
    if (res.status === 401) {
      gcalToken = null;
      updateGcalStatusUI();
      return reservation.gcalEventId || null;
    }
    if (!res.ok) return reservation.gcalEventId || null;
    const data = await res.json();
    return data.id;
  } catch (e) {
    return reservation.gcalEventId || null;
  }
}

async function deleteFromCalendar(eventId) {
  if (!gcalToken || !eventId) return;
  try {
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${gcalToken}` }
    });
  } catch (e) {
    // 削除に失敗しても致命的ではないので無視
  }
}

// ---- 予約開始日（抽選・受付開始）のリマインダーをGoogleカレンダーに同期 ----
// リマインダーイベントは checkmateccApp タグを付けない（syncFromCalendarの取得対象から外し、
// 予約本体と混同しないようにするため）。
async function pushReminderEvent(reminder, existingEventId) {
  if (!gcalToken) return existingEventId || null;
  const pad = n => String(n).padStart(2, "0");
  let event;
  if (reminder.allDay) {
    const d = reminder.date;
    const next = new Date(d);
    next.setDate(next.getDate() + 1);
    const dateStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    const nextStr = `${next.getFullYear()}-${pad(next.getMonth() + 1)}-${pad(next.getDate())}`;
    event = {
      summary: reminder.title,
      start: { date: dateStr },
      end: { date: nextStr },
      extendedProperties: { private: { checkmateccReminder: "true" } }
    };
  } else {
    const s = reminder.start;
    const e = new Date(s);
    e.setHours(e.getHours() + 1);
    const startISO = `${s.getFullYear()}-${pad(s.getMonth() + 1)}-${pad(s.getDate())}T${pad(s.getHours())}:${pad(s.getMinutes())}:00`;
    const endISO = `${e.getFullYear()}-${pad(e.getMonth() + 1)}-${pad(e.getDate())}T${pad(e.getHours())}:${pad(e.getMinutes())}:00`;
    event = {
      summary: reminder.title,
      start: { dateTime: startISO, timeZone: "Asia/Tokyo" },
      end: { dateTime: endISO, timeZone: "Asia/Tokyo" },
      extendedProperties: { private: { checkmateccReminder: "true" } },
      // 開始10分前と開始時刻の2回、ポップアップ通知でアラートする
      reminders: {
        useDefault: false,
        overrides: [
          { method: "popup", minutes: 10 },
          { method: "popup", minutes: 0 }
        ]
      }
    };
    // 実際に予約が取れる（予約開始・先着予約開始）タイミングは赤色で目立たせる
    if (reminder.key === "open" || reminder.key === "firstCome") {
      event.colorId = "11"; // Tomato（赤）
    }
  }
  const url = existingEventId
    ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${existingEventId}`
    : `https://www.googleapis.com/calendar/v3/calendars/primary/events`;
  const method = existingEventId ? "PATCH" : "POST";
  try {
    const res = await fetch(url, {
      method,
      headers: {
        "Authorization": `Bearer ${gcalToken}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(event)
    });
    if (res.status === 401) {
      gcalToken = null;
      updateGcalStatusUI();
      return existingEventId || null;
    }
    if (!res.ok) return existingEventId || null;
    const data = await res.json();
    return data.id;
  } catch (e) {
    return existingEventId || null;
  }
}

// 予約のステータス・ゴルフ場・プレー日に応じて、必要なリマインダーだけをカレンダーに残す
// （不要になったものは削除し、必要なものは作成・更新する）。戻り値は最新のreminderEventIdsマップ。
async function syncBookingReminders(reservation) {
  const existingIds = reservation.reminderEventIds || {};
  const status = reservation.status || "確定";
  const desired = status === "確定"
    ? []
    : computeBookingReminders(reservation.course, reservation.playDate);
  const desiredKeys = desired.map(r => r.key);
  const newIds = {};

  for (const key of Object.keys(existingIds)) {
    if (!desiredKeys.includes(key) && existingIds[key]) {
      await deleteFromCalendar(existingIds[key]);
    }
  }
  for (const reminder of desired) {
    const existingId = existingIds[reminder.key] || null;
    const newId = await pushReminderEvent(reminder, existingId);
    if (newId) newIds[reminder.key] = newId;
  }
  return newIds;
}

async function deleteAllBookingReminders(reservation) {
  const ids = reservation.reminderEventIds || {};
  for (const key of Object.keys(ids)) {
    if (ids[key]) await deleteFromCalendar(ids[key]);
  }
}

// ---- 同伴者名を表示する終日イベント ----
// 実際のラウンド時間のイベントとは別に、プレー日の終日表示欄に「○○さん、△△さん」の形で
// 同伴者名を一覧表示するための予定を作成する。checkmateccApp タグは付けず、
// syncFromCalendar の取得対象（予約本体）とは混同しないようにする。
// 組み合わせ枠・競技の場合は個別の同伴者名がいないため、代わりに「組み合わせ」「競技」と表示する。
function buildCompanionsEventSummary(reservation) {
  const specialLabels = [];
  if (reservation.comboSlot) specialLabels.push("組み合わせ");
  if (reservation.competition) specialLabels.push("競技");
  if (specialLabels.length > 0) return specialLabels.join("、");
  const playerNames = (reservation.players || []).map(n => (n || "").trim()).filter(n => n);
  return playerNames.map(n => `${n}さん`).join("、");
}

async function pushCompanionsEvent(reservation, existingEventId) {
  if (!gcalToken || !reservation.playDate) return existingEventId || null;
  const pad = n => String(n).padStart(2, "0");
  const d = new Date(reservation.playDate + "T00:00:00");
  const next = new Date(d);
  next.setDate(next.getDate() + 1);
  const dateStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const nextStr = `${next.getFullYear()}-${pad(next.getMonth() + 1)}-${pad(next.getDate())}`;
  const summary = buildCompanionsEventSummary(reservation);
  const event = {
    summary,
    start: { date: dateStr },
    end: { date: nextStr },
    extendedProperties: { private: { checkmateccCompanions: "true" } }
  };
  const url = existingEventId
    ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${existingEventId}`
    : `https://www.googleapis.com/calendar/v3/calendars/primary/events`;
  const method = existingEventId ? "PATCH" : "POST";
  try {
    const res = await fetch(url, {
      method,
      headers: {
        "Authorization": `Bearer ${gcalToken}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(event)
    });
    if (res.status === 401) {
      gcalToken = null;
      updateGcalStatusUI();
      return existingEventId || null;
    }
    if (!res.ok) return existingEventId || null;
    const data = await res.json();
    return data.id;
  } catch (e) {
    return existingEventId || null;
  }
}

// 同伴者が1人もおらず、組み合わせ枠・競技でもない場合は不要なのでイベントを削除する。
// それ以外（同伴者がいる、または組み合わせ枠／競技である）場合は作成・更新する。
async function syncCompanionsEvent(reservation) {
  const playerNames = (reservation.players || []).map(n => (n || "").trim()).filter(n => n);
  const isSpecial = !!(reservation.comboSlot || reservation.competition);
  if (playerNames.length === 0 && !isSpecial) {
    if (reservation.companionsEventId) {
      await deleteFromCalendar(reservation.companionsEventId);
    }
    return null;
  }
  return await pushCompanionsEvent(reservation, reservation.companionsEventId || null);
}

function parseEventDescription(desc) {
  const lines = (desc || "").split("\n");
  let players = ["", "", ""];
  let timeChangeRequested = false;
  let timeChangeNote = "";
  let course = "";
  let courseName = "";
  let bookingSite = "";
  let status = "確定";
  let startNine = "";
  let caddieType = "";
  let comboSlot = false;
  let registrationComplete = false;
  let notOwnSlot = false;
  let competition = false;
  lines.forEach(line => {
    if (line.startsWith("ゴルフ場: ")) {
      const val = line.replace("ゴルフ場: ", "").trim();
      course = val === "ゴルフ場未設定" ? "" : val;
    } else if (line.startsWith("コース名: ")) {
      const val = line.replace("コース名: ", "").trim();
      courseName = val === "なし" ? "" : val;
    } else if (line.startsWith("予約サイト: ")) {
      bookingSite = line.replace("予約サイト: ", "").trim();
    } else if (line.startsWith("ステータス: ")) {
      const val = line.replace("ステータス: ", "").trim();
      status = (val === "未予約" || val === "抽選待") ? val : "確定";
    } else if (line.startsWith("スタート: ")) {
      const val = line.replace("スタート: ", "").trim();
      startNine = val === "未設定" ? "" : val;
    } else if (line.startsWith("キャディ: ")) {
      const val = line.replace("キャディ: ", "").trim();
      caddieType = val === "未設定" ? "" : val;
    } else if (line.startsWith("プレーヤー: ")) {
      const val = line.replace("プレーヤー: ", "").trim();
      const names = val === "なし" ? [] : val.split("、");
      players = [names[0] || "", names[1] || "", names[2] || ""];
    } else if (line.startsWith("組み合わせ枠: ")) {
      comboSlot = line.replace("組み合わせ枠: ", "").trim() === "あり";
    } else if (line.startsWith("登録完了: ")) {
      registrationComplete = line.replace("登録完了: ", "").trim() === "あり";
    } else if (line.startsWith("自分の予約枠ではない: ")) {
      notOwnSlot = line.replace("自分の予約枠ではない: ", "").trim() === "あり";
    } else if (line.startsWith("競技: ")) {
      competition = line.replace("競技: ", "").trim() === "あり";
    } else if (line.startsWith("時間変更依頼: ")) {
      timeChangeRequested = true;
      timeChangeNote = line.replace("時間変更依頼: ", "").trim();
    }
  });
  return { course, courseName, bookingSite, status, startNine, caddieType, players, timeChangeRequested, timeChangeNote, comboSlot, registrationComplete, notOwnSlot, competition };
}

// Googleカレンダーを正として、ローカルの予約一覧をまるごと作り直す。
// 別の端末（iPhoneなど）で追加・変更された予約もここで反映される。
async function syncFromCalendar() {
  if (!gcalToken) return;
  const syncBtn = document.getElementById("gcalSyncBtn");
  const originalText = syncBtn.textContent;
  syncBtn.textContent = "同期中...";
  syncBtn.disabled = true;
  try {
    const timeMin = new Date();
    timeMin.setDate(timeMin.getDate() - 60);
    const timeMax = new Date();
    timeMax.setDate(timeMax.getDate() + 365);
    const params = new URLSearchParams({
      privateExtendedProperty: "checkmateccApp=true",
      timeMin: timeMin.toISOString(),
      timeMax: timeMax.toISOString(),
      singleEvents: "true",
      maxResults: "250"
    });
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`, {
      headers: { "Authorization": `Bearer ${gcalToken}` }
    });
    if (res.status === 401) {
      gcalToken = null;
      lastSyncFailed = false;
      updateGcalStatusUI();
      return;
    }
    if (!res.ok) {
      lastSyncFailed = true;
      updateGcalStatusUI();
      return;
    }
    const data = await res.json();
    // 終日イベント（未予約・抽選待などスタート時間未定の仮予定）も対象に含める
    const remoteEvents = (data.items || []).filter(ev => ev.start && (ev.start.dateTime || ev.start.date));

    let list = loadReservations();
    const remoteIds = new Set();

    remoteEvents.forEach(ev => {
      remoteIds.add(ev.id);
      let remoteDate, remoteTime;
      if (ev.start.dateTime) {
        remoteDate = ev.start.dateTime.slice(0, 10);
        remoteTime = ev.start.dateTime.slice(11, 16);
      } else {
        remoteDate = ev.start.date;
        remoteTime = "";
      }
      const parsed = parseEventDescription(ev.description);
      const existing = list.find(r => r.gcalEventId === ev.id);
      if (existing) {
        existing.playDate = remoteDate;
        existing.startTime = remoteTime;
        existing.course = parsed.course;
        existing.courseName = parsed.courseName;
        existing.bookingSite = parsed.bookingSite;
        existing.status = parsed.status;
        existing.startNine = parsed.startNine;
        existing.caddieType = parsed.caddieType;
        existing.players = parsed.players;
        existing.timeChangeRequested = parsed.timeChangeRequested;
        existing.timeChangeNote = parsed.timeChangeNote;
        existing.comboSlot = parsed.comboSlot;
        existing.registrationComplete = parsed.registrationComplete;
        existing.notOwnSlot = parsed.notOwnSlot;
        existing.competition = parsed.competition;
      } else {
        list.push({
          id: uid(),
          gcalEventId: ev.id,
          playDate: remoteDate,
          startTime: remoteTime,
          course: parsed.course,
          courseName: parsed.courseName,
          bookingSite: parsed.bookingSite,
          status: parsed.status,
          startNine: parsed.startNine,
          caddieType: parsed.caddieType,
          players: parsed.players,
          timeChangeRequested: parsed.timeChangeRequested,
          timeChangeNote: parsed.timeChangeNote,
          comboSlot: parsed.comboSlot,
          registrationComplete: parsed.registrationComplete,
          notOwnSlot: parsed.notOwnSlot,
          competition: parsed.competition,
          reminderEventIds: {}
        });
      }
    });

    // カレンダー側から削除された予約（取得範囲内）はローカルからも取り除く
    list = list.filter(r => !r.gcalEventId || remoteIds.has(r.gcalEventId));

    saveReservations(list);
    render();
    lastSyncFailed = false;
    updateGcalStatusUI();
  } catch (e) {
    lastSyncFailed = true;
    updateGcalStatusUI();
  } finally {
    syncBtn.textContent = originalText;
    syncBtn.disabled = false;
  }
}

function pad2(n) { return String(n).padStart(2, "0"); }
function toISODate(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}`; }

const playDateInput = document.getElementById("playDate");

let calendarViewMonth = null; // 0-indexed

function setPlayDateValue(value) {
  playDateInput.value = value || "";
  playDateButton.textContent = value ? formatDateLabel(value) : "日付を選択";
  updateBookingReminderInfoUI();

function openCalendar() {
  const current = playDateInput.value;
  const base = current ? new Date(current + "T00:00:00") : new Date();
  calendarViewYear = base.getFullYear();
  calendarViewMonth = base.getMonth();
  renderCalendarGrid();
  playDateCalendar.style.display = "block";
}

function closeCalendar() {
  playDateCalendar.style.display = "none";
}

function renderCalendarGrid() {
  calMonthLabel.textContent = `${calendarViewYear}年${calendarViewMonth + 1}月`;
  calGrid.innerHTML = "";

  const firstOfMonth = new Date(calendarViewYear, calendarViewMonth, 1);
  const startOffset = (firstOfMonth.getDay() + 6) % 7; // 月曜はじまり: 0=月...6=日
  const daysInMonth = new Date(calendarViewYear, calendarViewMonth + 1, 0).getDate();
  const todayIso = todayStr();
  const selectedIso = playDateInput.value;

  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement("span");
    empty.className = "calendar-day empty";
    calGrid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const iso = toISODate(calendarViewYear, calendarViewMonth, day);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "calendar-day";
    if (iso === todayIso) btn.classList.add("today");
    if (iso === selectedIso) btn.classList.add("selected");
    btn.textContent = day;
    btn.addEventListener("click", () => {
      setPlayDateValue(iso);
      closeCalendar();
    });
    calGrid.appendChild(btn);
  }
}

function showConfirmModal(message) {
  return new Promise((resolve) => {
    const overlay = document.getElementById("confirmModalOverlay");
    const yesBtn = document.getElementById("confirmModalYes");
    const noBtn = document.getElementById("confirmModalNo");
    document.getElementById("confirmModalMessage").textContent = message;
    overlay.style.display = "flex";
    function cleanup(result) {
      overlay.style.display = "none";
      yesBtn.removeEventListener("click", onYes);
      noBtn.removeEventListener("click", onNo);
      resolve(result);
    }
    function onYes() { cleanup(true); }
    function onNo() { cleanup(false); }
    yesBtn.addEventListener("click", onYes);
    noBtn.addEventListener("click", onNo);
  });
}

async function deleteReservation(id) {
  const confirmed = await showConfirmModal("本当に削除しますか？");

  let list = loadReservations();
  const target = list.find(x => x.id === id);
  if (target && target.gcalEventId) {
    await deleteFromCalendar(target.gcalEventId);
  }
  if (target) {
    await deleteAllBookingReminders(target);
  }
  if (target && target.companionsEventId) {
    await deleteFromCalendar(target.companionsEventId);
  }
  list = list.filter(x => x.id !== id);
  saveReservations(list);
  render();
}

  list.forEach(r => {
    if (!r.playDate) return;
    (byDate[r.playDate] = byDate[r.playDate] || []).push(r);
  });

  const firstOfMonth = new Date(resCalYear, resCalMonth, 1);
  // 月曜はじまりのオフセット (0=月,...,6=日)
  const startOffset = (firstOfMonth.getDay() + 6) % 7;
  const daysInMonth = new Date(resCalYear, resCalMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(resCalYear, resCalMonth, 0).getDate();
  const todayIso = todayStr();

  const prevM = resCalMonth === 0 ? 11 : resCalMonth - 1;
  const prevY = resCalMonth === 0 ? resCalYear - 1 : resCalYear;
  const nextM = resCalMonth === 11 ? 0 : resCalMonth + 1;
  const nextY = resCalMonth === 11 ? resCalYear + 1 : resCalYear;

  const cells = [];
  for (let i = 0; i < startOffset; i++) {
    const d = daysInPrevMonth - startOffset + 1 + i;
    cells.push({ day: d, otherMonth: true, iso: toISODate(prevY, prevM, d) });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, otherMonth: false, iso: toISODate(resCalYear, resCalMonth, d) });
  }
  let nextDay = 1;
  while (cells.length % 7 !== 0 || cells.length < 42) {
    cells.push({ day: nextDay, otherMonth: true, iso: toISODate(nextY, nextM, nextDay) });
    nextDay++;
    if (cells.length >= 42) break;
  }

  cells.forEach(cell => {
    const dayEl = document.createElement("div");
    dayEl.className = "month-day" + (cell.otherMonth ? " other-month" : "") + (cell.iso === todayIso ? " today" : "");
    const num = document.createElement("div");
    num.className = "month-day-num";
    num.textContent = cell.day;
    dayEl.appendChild(num);

    const dayRes = (byDate[cell.iso] || []).slice().sort((a, b) => a.startTime.localeCompare(b.startTime));
    dayRes.forEach(r => {
      const tag = document.createElement("div");
      tag.className = "month-day-res";
      tag.textContent = `${r.startTime || ""} ${courseAbbrev(r.course)}`;
      tag.addEventListener("click", () => {
        toggleMonthCalendarView(false);
        startEdit(r.id);
      });
      dayEl.appendChild(tag);
    });

    resCalGrid.appendChild(dayEl);
  });
}

function toggleMonthCalendarView(forceShow) {
  monthCalendarVisible = typeof forceShow === "boolean" ? forceShow : !monthCalendarVisible;
  if (monthCalendarVisible) {
    resCalYear = today0.getFullYear();
    resCalMonth = today0.getMonth();
    monthCalendarView.style.display = "block";
    resListEl.style.display = "none";
    document.getElementById("emptyMsg").style.display = "none";
    monthCalToggleBtn.textContent = "一覧表示に戻す";
    renderMonthCalendar();
  } else {
    monthCalendarView.style.display = "none";
    resListEl.style.display = "flex";
    monthCalToggleBtn.textContent = "月次カレンダー表示";
    render();
  }
}

monthCalToggleBtn.addEventListener("click", () => toggleMonthCalendarView());

document.getElementById("resCalPrevMonth").addEventListener("click", () => {
  resCalMonth--;
  if (resCalMonth < 0) { resCalMonth = 11; resCalYear--; }
  renderMonthCalendar();
});

document.getElementById("resCalNextMonth").addEventListener("click", () => {
  resCalMonth++;
  if (resCalMonth > 11) { resCalMonth = 0; resCalYear++; }
  renderMonthCalendar();
});

const KNOWN_COURSES = ["横浜CC", "チェックメイトCC", "太平洋クラブ"];

function getFrequentPlayerNames(limit, courseFilter) {
  const list = loadReservations();
  const scoped = courseFilter ? list.filter(r => r.course === courseFilter) : list;
  const counts = {};
  scoped.forEach(r => {
    (r.players || []).forEach(name => {
      const n = (name || "").trim();
      if (!n) return;
      counts[n] = (counts[n] || 0) + 1;
    });
  });
  return Object.keys(counts)
    .sort((a, b) => counts[b] - counts[a] || a.localeCompare(b, "ja"))
    .slice(0, limit || 6);
}

function fillPlayerName(name) {
  const inputs = [
    document.getElementById("player1"),
    document.getElementById("player2"),
    document.getElementById("player3")
  ];
  const target = inputs.find(inp => !inp.value.trim());
  if (target) {
    target.value = name;
  }
}

function renderFrequentPlayers() {
  const wrap = document.getElementById("frequentPlayersWrap");
  const row = document.getElementById("frequentPlayersRow");
  const label = document.getElementById("frequentPlayersLabel");
  const currentCourse = getCourseValue();
  const names = getFrequentPlayerNames(6, currentCourse);
  row.innerHTML = "";
  if (names.length === 0) {
    wrap.style.display = "none";
    return;
  }
  label.textContent = currentCourse ? `よく使う同伴者（${currentCourse}）` : "よく使う同伴者";
  wrap.style.display = "block";
  names.forEach(name => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "filter-chip";
    chip.textContent = name;
    chip.addEventListener("click", () => fillPlayerName(name));
    row.appendChild(chip);
  });
}

function getClubEmailAddress(r) {
  if (r.course === PACIFIC_CLUB_NAME) {
    return PACIFIC_BRANCH_EMAIL_MAP[r.courseName] || "";
  }
  return CLUB_EMAIL_MAP[r.course] || "";
}

function buildReservationEmailMailto(r) {
  const address = getClubEmailAddress(r);
  if (!address) return null;

  let courseLine = "";
  if (r.course) {
    if (r.courseName && r.course === PACIFIC_CLUB_NAME) {
      courseLine = `${r.course} ${r.courseName}`;
    } else if (r.courseName) {
      courseLine = `${r.course}（${r.courseName}）`;
    } else {
      courseLine = r.course;
    }
  }
  const dateLabel = r.playDate ? formatDateLabel(r.playDate) : "";
  let startLine = r.startTime || "";
  if (r.startNine) startLine += ` ${r.startNine}`;
  const playerNames = (r.players || [r.companions || ""]).filter(n => n && n.trim());

  const subject = `ゴルフ予約 同伴者登録のご連絡（${dateLabel || courseLine}）`;

  const bodyLines = [];
  bodyLines.push("お世話になっております。 ");
  bodyLines.push("");
  bodyLines.push(" 以下のラウンドのプレーヤーが決まりましたのでお知らせします。");
  bodyLines.push("");
  if (courseLine) bodyLines.push(courseLine);
  if (dateLabel) bodyLines.push(dateLabel);
  if (startLine) bodyLines.push(startLine);
  bodyLines.push("");
  bodyLines.push("定国直樹");
  playerNames.forEach(n => bodyLines.push(n));
  bodyLines.push("");
  bodyLines.push("どうぞよろしくお願いします。");
  bodyLines.push("");
  bodyLines.push("-----");
  bodyLines.push("定国直樹");

  const body = bodyLines.join("\r\n");
  return `mailto:${address}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function buildReservationCopyText(r) {
  const lines = [];
  if (r.course) {
    if (r.courseName && r.course === PACIFIC_CLUB_NAME) {
      lines.push(`${r.course} ${r.courseName}`);
    } else if (r.courseName) {
      lines.push(`${r.course}（${r.courseName}）`);
    } else {
      lines.push(r.course);
    }
  }
  if (r.playDate) lines.push(formatDateLabel(r.playDate));
  let startLine = r.startTime || "";
  if (r.startNine) startLine += ` ${r.startNine}`;
  if (startLine) lines.push(startLine);
  lines.push("定国直樹");
  const playerNames = (r.players || [r.companions || ""]).filter(n => n && n.trim());
  playerNames.forEach(n => lines.push(n));
  return lines.join("\n");
}

async function copyReservationInfo(r, btn) {
  const text = buildReservationCopyText(r);
  const originalText = btn.textContent;
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    btn.textContent = "コピーしました";
  } catch (e) {
    btn.textContent = "コピー失敗";
  }
  setTimeout(() => { btn.textContent = originalText; }, 1500);
}

function render() {
  renderFrequentPlayers();
  let list = loadReservations();
  list.sort((a, b) => (a.playDate + a.startTime).localeCompare(b.playDate + b.startTime));

  const today = todayStr();

  if (showPast) {
    list = list.filter(r => r.playDate < today);
    list.reverse();
  } else {
    list = list.filter(r => r.playDate >= today);
  }

  if (currentCourseFilter === "__other__") {
    list = list.filter(r => r.course && !KNOWN_COURSES.includes(r.course));
  } else if (currentCourseFilter) {
    list = list.filter(r => r.course === currentCourseFilter);
  }

  const container = document.getElementById("resList");
  const emptyMsg = document.getElementById("emptyMsg");
  container.innerHTML = "";

  if (list.length === 0) {
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";

  list.forEach(r => {
    const item = document.createElement("div");
    item.className = "res-item" + (!showPast && r.playDate < today ? " past" : "");

    const main = document.createElement("div");
    main.className = "res-main";

    const dateLine = document.createElement("div");
    dateLine.className = "date-line";
    const status = r.status || "確定";
    if (status !== "確定") {
      const statusTag = document.createElement("span");
      statusTag.className = "status-tag" + (status === "未予約" ? " status-mikakutei" : " status-chusenmachi");
      statusTag.textContent = status;
      dateLine.appendChild(statusTag);
    }
    if (r.course) {
      const courseTag = document.createElement("span");
      courseTag.className = "course-tag";
      if (r.courseName && r.course === PACIFIC_CLUB_NAME) {
        courseTag.textContent = `${r.course} ${r.courseName}`;
      } else if (r.courseName) {
        courseTag.textContent = `${r.course}（${r.courseName}）`;
      } else {
        courseTag.textContent = r.course;
      }
      dateLine.appendChild(courseTag);
    }
    let dateText = r.startTime ? `${formatDateLabel(r.playDate)} ${r.startTime}〜` : `${formatDateLabel(r.playDate)}`;
    if (r.startNine) dateText += `（${r.startNine}）`;
    dateLine.appendChild(document.createTextNode(dateText));
    if (r.competition) {
      const competitionBadge = document.createElement("span");
      competitionBadge.className = "sync-tag sync-tag-orange";
      competitionBadge.textContent = "競技";
      dateLine.appendChild(competitionBadge);
    }
    if (status !== "未予約" && !r.registrationComplete && !r.notOwnSlot) {
      const unregisteredBadge = document.createElement("span");
      unregisteredBadge.className = "sync-tag sync-tag-danger";
      unregisteredBadge.textContent = "未登録";
      dateLine.appendChild(unregisteredBadge);
    }
    if (r.timeChangeRequested) {
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = "変更依頼あり";
      dateLine.appendChild(badge);
    }
    if (r.comboSlot) {
      const comboBadge = document.createElement("span");
      comboBadge.className = "sync-tag";
      comboBadge.textContent = "組み合わせ枠";
      dateLine.appendChild(comboBadge);
    }
    if (r.registrationComplete) {
      const regBadge = document.createElement("span");
      regBadge.className = "sync-tag";
      regBadge.textContent = "登録済";
      dateLine.appendChild(regBadge);
    }
    if (r.notOwnSlot) {
      const inviteBadge = document.createElement("span");
      inviteBadge.className = "sync-tag";
      inviteBadge.textContent = "招待枠";
      dateLine.appendChild(inviteBadge);
    }
    if (r.gcalEventId) {
      const tag = document.createElement("span");
      tag.className = "sync-tag";
      tag.textContent = "カレンダー同期済み";
      dateLine.appendChild(tag);
    }

    const subLine = document.createElement("div");
    subLine.className = "sub-line";
    const playerNames = (r.players || [r.companions || ""]).filter(n => n && n.trim());
    let subText = r.caddieType ? `${r.caddieType}` : "";
    subText += subText ? "　／　" : "";
    subText += playerNames.length ? `同伴者: ${playerNames.join("、")}` : "同伴者: なし";
    if (r.timeChangeRequested && r.timeChangeNote) {
      subText += `　／　${r.timeChangeNote}`;
    }
    subLine.textContent = subText;

    main.appendChild(dateLine);
    main.appendChild(subLine);

    if (status !== "確定") {
      const reminders = computeBookingReminders(r.course, r.playDate);
      if (reminders.length > 0) {
        const reminderLine = document.createElement("div");
        reminderLine.className = "sub-line";
        reminderLine.style.color = "var(--green-dark)";
        reminderLine.textContent = reminders.map(rem => {
          const when = rem.allDay ? dateOnlyLabel(rem.date) : dateTimeLabel(rem.start);
          return `${rem.label}: ${when}`;
        }).join("　／　");
        main.appendChild(reminderLine);
      }
    }

    const actions = document.createElement("div");
    actions.className = "res-actions";

    const editBtn = document.createElement("button");
    editBtn.className = "icon-btn";
    editBtn.textContent = "変更";
    editBtn.addEventListener("click", () => startEdit(r.id));

    const copyBtn = document.createElement("button");
    copyBtn.className = "icon-btn";
    copyBtn.textContent = "情報コピー";
    copyBtn.addEventListener("click", () => copyReservationInfo(r, copyBtn));

    actions.appendChild(editBtn);
    actions.appendChild(copyBtn);

    const mailtoUrl = buildReservationEmailMailto(r);
    if (mailtoUrl) {
      const emailBtn = document.createElement("a");
      emailBtn.className = "icon-btn";
      emailBtn.textContent = "Eメール連絡";
      emailBtn.href = mailtoUrl;
      actions.appendChild(emailBtn);
    }

    item.appendChild(main);
    item.appendChild(actions);
    container.appendChild(item);
  });
}
