<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゴルフ予約管理</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --green: #2e7d4f;
    --green-dark: #1f5c39;
    --bg: #f4f6f4;
    --card: #ffffff;
    --border: #dfe4df;
    --text: #26302a;
    --muted: #6b756f;
    --danger: #c0392b;
    --warn-bg: #fff4e5;
    --warn-text: #9a6400;
  }
  * { box-sizing: border-box; }
  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--green);
    color: #fff;
    padding: 20px 24px;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.9;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 15px;
    margin: 0 0 14px;
    color: var(--green-dark);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .form-grid > div {
    min-width: 0;
  }
  @media (max-width: 480px) {
    .date-time-field { grid-column: 1 / -1; }
  }
  label {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  input[type="date"], input[type="time"], input[type="text"], select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  .course-tag {
    display: inline-block;
    font-size: 12px;
    color: #fff;
    background: var(--green);
    padding: 2px 9px;
    border-radius: 999px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .filter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .course-filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-chip {
    background: #eceeec;
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
  }
  .filter-chip.active { background: var(--green); color: #fff; }
  .full-width { grid-column: 1 / -1; }
  .players-col {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-size: 14px; color: var(--text); }
  .form-actions {
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    font-size: 14px;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-secondary { background: #eceeec; color: var(--text); }
  .btn-secondary:hover { background: #dde1dd; }
  .btn-danger { background: #fbe9e7; color: var(--danger); }
  .btn-danger:hover { background: #f8d7d2; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .res-list { display: flex; flex-direction: column; gap: 10px; }
  .res-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .res-main {
    min-width: 0;
    word-break: break-word;
  }
  .res-item.past { opacity: 0.55; }
  .res-main .date-line {
    font-size: 15px;
    font-weight: 600;
    color: var(--green-dark);
  }
  .res-main .sub-line {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }
  .badge {
    display: inline-block;
    background: var(--warn-bg);
    color: var(--warn-text);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
  }
  .res-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 6px;
  }
  .icon-btn:hover { background: #f0f1f0; }
  .icon-btn.delete:hover { color: var(--danger); border-color: var(--danger); }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 30px 0;
    font-size: 13px;
  }
  .gcal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .gcal-status {
    font-size: 13px;
    color: var(--muted);
  }
  .gcal-status.connected { color: var(--green-dark); font-weight: 600; }
  .gcal-actions { display: flex; gap: 8px; }
  .sync-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--green-dark);
    background: #e6f2ea;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>ゴルフ予約管理</h1>
</header>

<main>
  <div class="card">
    <h2>Googleカレンダー連携</h2>
    <div class="gcal-row">
      <div class="gcal-status" id="gcalStatus">未接続です</div>
      <div class="gcal-actions">
        <button class="btn-secondary" id="gcalConnectBtn">Googleカレンダーに接続</button>
        <button class="btn-secondary" id="gcalSyncBtn" style="display:none;">Googleカレンダーから最新を取得</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 id="form-title">予約を追加</h2>
    <div class="form-grid">
      <div class="full-width">
        <label for="courseSelect">ゴルフ場</label>
        <select id="courseSelect">
          <option value="">選択</option>
          <option value="横浜CC">横浜CC</option>
          <option value="チェックメイトCC">チェックメイトCC</option>
          <option value="太平洋クラブ">太平洋クラブ</option>
          <option value="__custom__">その他（自由入力）</option>
        </select>
      </div>
      <div class="full-width" id="courseCustomWrap" style="display:none;">
        <label for="courseCustom">ゴルフ場名を入力</label>
        <input type="text" id="courseCustom" placeholder="例: 〇〇カントリークラブ">
      </div>
      <div class="full-width" id="pacificBranchWrap" style="display:none;">
        <label for="pacificBranchSelect">コース</label>
        <select id="pacificBranchSelect">
          <option value="">選択</option>
          <option value="御殿場">御殿場</option>
          <option value="御殿場WEST">御殿場WEST</option>
          <option value="佐野">佐野</option>
          <option value="美野里">美野里</option>
          <option value="成田">成田</option>
          <option value="八千代">八千代</option>
          <option value="市原">市原</option>
          <option value="軽井沢">軽井沢</option>
          <option value="相模">相模</option>
          <option value="江南">江南</option>
          <option value="大洗">大洗</option>
          <option value="益子">益子</option>
          <option value="__custom__">その他</option>
        </select>
      </div>
      <div class="full-width" id="pacificBranchCustomWrap" style="display:none;">
        <label for="pacificBranchCustom">支店名を入力</label>
        <input type="text" id="pacificBranchCustom" placeholder="例: 〇〇コース">
      </div>
      <div class="full-width" id="yokohamaCourseWrap" style="display:none;">
        <label for="yokohamaCourseSelect">コース</label>
        <select id="yokohamaCourseSelect">
          <option value="">選択</option>
          <option value="西">西</option>
          <option value="東">東</option>
          <option value="__custom__">その他</option>
        </select>
      </div>
      <div class="full-width" id="yokohamaCourseCustomWrap" style="display:none;">
        <label for="yokohamaCourseCustom">コース名を入力</label>
        <input type="text" id="yokohamaCourseCustom" placeholder="例: 〇〇コース">
      </div>
      <div class="full-width" id="courseNameWrap">
        <label for="courseNameInput">コース名</label>
        <input type="text" id="courseNameInput" placeholder="例: 東コース、西コースなど">
      </div>
      <div class="date-time-field">
        <label for="playDate">プレー日</label>
        <input type="date" id="playDate">
      </div>
      <div class="date-time-field">
        <label for="startTime">スタート時間</label>
        <input type="time" id="startTime" min="05:00" max="15:00">
      </div>
      <div>
        <label for="startNine">スタート</label>
        <select id="startNine">
          <option value="">選択</option>
          <option value="OUT">OUT</option>
          <option value="IN">IN</option>
          <option value="__custom__">その他</option>
        </select>
      </div>
      <div class="full-width" id="startNineCustomWrap" style="display:none;">
        <label for="startNineCustom">スタートを入力</label>
        <input type="text" id="startNineCustom" placeholder="例: 特設ティー">
      </div>
      <div>
        <label for="caddieType">セルフ・キャディ</label>
        <select id="caddieType">
          <option value="">選択</option>
          <option value="セルフ">セルフ</option>
          <option value="キャディ付き">キャディ付き</option>
        </select>
      </div>
      <div class="players-col">
        <div>
          <label for="player1">同伴者1</label>
          <input type="text" id="player1">
        </div>
        <div>
          <label for="player2">同伴者2</label>
          <input type="text" id="player2">
        </div>
        <div>
          <label for="player3">同伴者3</label>
          <input type="text" id="player3">
        </div>
      </div>
      <div class="full-width">
        <div class="checkbox-row">
          <input type="checkbox" id="timeChangeRequested">
          <label for="timeChangeRequested">時間変更依頼あり</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="comboSlot">
          <label for="comboSlot">組み合わせ枠</label>
        </div>
      </div>
      <div class="full-width" id="timeChangeNoteWrap" style="display:none;">
        <label for="timeChangeNote">変更依頼の内容・希望時間など</label>
        <input type="text" id="timeChangeNote" placeholder="例: 9:00台に変更希望、連絡済み">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="saveBtn">追加する</button>
      <button class="btn-secondary" id="cancelBtn" style="display:none;">キャンセル</button>
      <button class="btn-danger" id="deleteBtn" style="display:none;">この予約を削除</button>
    </div>
    <div class="sub-line" id="connectRequiredNote" style="display:none; margin-top:10px;">Googleカレンダーに接続すると予約を追加・変更できます。上の「Googleカレンダーに接続」から接続してください。</div>
  </div>

  <div class="card">
    <h2>予約一覧</h2>
    <div class="filter-row">
      <div class="course-filter-row" id="courseFilterRow">
        <button type="button" class="filter-chip active" data-course="">すべて</button>
        <button type="button" class="filter-chip" data-course="横浜CC">YCC</button>
        <button type="button" class="filter-chip" data-course="チェックメイトCC">CMC</button>
        <button type="button" class="filter-chip" data-course="太平洋クラブ">TYC</button>
        <button type="button" class="filter-chip" data-course="__other__">その他</button>
      </div>
      <button class="btn-secondary" id="pastToggleBtn">過去の予約を表示</button>
    </div>
    <div class="res-list" id="resList"></div>
    <div class="empty" id="emptyMsg" style="display:none;">予約はまだありません</div>
  </div>
</main>

<script>
const STORAGE_KEY = "checkmatecc_reservations";
let editingId = null;
let currentCourseFilter = "";
let showPast = false;

// ---- ゴルフ場（コース）選択 ----
const courseSelect = document.getElementById("courseSelect");
const courseCustomWrap = document.getElementById("courseCustomWrap");
const courseCustomInput = document.getElementById("courseCustom");
const courseNameWrap = document.getElementById("courseNameWrap");
const courseNameInput = document.getElementById("courseNameInput");
const pacificBranchWrap = document.getElementById("pacificBranchWrap");
const pacificBranchSelect = document.getElementById("pacificBranchSelect");
const pacificBranchCustomWrap = document.getElementById("pacificBranchCustomWrap");
const pacificBranchCustomInput = document.getElementById("pacificBranchCustom");
const yokohamaCourseWrap = document.getElementById("yokohamaCourseWrap");
const yokohamaCourseSelect = document.getElementById("yokohamaCourseSelect");
const yokohamaCourseCustomWrap = document.getElementById("yokohamaCourseCustomWrap");
const yokohamaCourseCustomInput = document.getElementById("yokohamaCourseCustom");
const startNineSelect = document.getElementById("startNine");
const startNineCustomWrap = document.getElementById("startNineCustomWrap");
const startNineCustomInput = document.getElementById("startNineCustom");
const caddieTypeSelect = document.getElementById("caddieType");

const PACIFIC_CLUB_NAME = "太平洋クラブ";
const YOKOHAMA_CC_NAME = "横浜CC";

courseSelect.addEventListener("change", () => {
  courseCustomWrap.style.display = courseSelect.value === "__custom__" ? "block" : "none";
  updateCourseNameUI();
});

pacificBranchSelect.addEventListener("change", () => {
  pacificBranchCustomWrap.style.display = pacificBranchSelect.value === "__custom__" ? "block" : "none";
});

yokohamaCourseSelect.addEventListener("change", () => {
  yokohamaCourseCustomWrap.style.display = yokohamaCourseSelect.value === "__custom__" ? "block" : "none";
});

function updateCourseNameUI() {
  pacificBranchWrap.style.display = "none";
  pacificBranchCustomWrap.style.display = "none";
  yokohamaCourseWrap.style.display = "none";
  yokohamaCourseCustomWrap.style.display = "none";
  courseNameWrap.style.display = "none";
  if (courseSelect.value === PACIFIC_CLUB_NAME) {
    pacificBranchWrap.style.display = "block";
    pacificBranchCustomWrap.style.display = pacificBranchSelect.value === "__custom__" ? "block" : "none";
  } else if (courseSelect.value === YOKOHAMA_CC_NAME) {
    yokohamaCourseWrap.style.display = "block";
    yokohamaCourseCustomWrap.style.display = yokohamaCourseSelect.value === "__custom__" ? "block" : "none";
  } else {
    courseNameWrap.style.display = "block";
  }
}

function getCourseValue() {
  if (courseSelect.value === "__custom__") {
    return courseCustomInput.value.trim();
  }
  return courseSelect.value;
}

function setCourseValue(courseName) {
  const presetValues = Array.from(courseSelect.options).map(o => o.value);
  if (courseName && presetValues.includes(courseName)) {
    courseSelect.value = courseName;
    courseCustomWrap.style.display = "none";
    courseCustomInput.value = "";
  } else if (courseName) {
    courseSelect.value = "__custom__";
    courseCustomInput.value = courseName;
    courseCustomWrap.style.display = "block";
  } else {
    courseSelect.value = "";
    courseCustomInput.value = "";
    courseCustomWrap.style.display = "none";
  }
  updateCourseNameUI();
}

function getCourseNameValue() {
  if (courseSelect.value === PACIFIC_CLUB_NAME) {
    if (pacificBranchSelect.value === "__custom__") {
      return pacificBranchCustomInput.value.trim();
    }
    return pacificBranchSelect.value;
  }
  if (courseSelect.value === YOKOHAMA_CC_NAME) {
    if (yokohamaCourseSelect.value === "__custom__") {
      return yokohamaCourseCustomInput.value.trim();
    }
    return yokohamaCourseSelect.value;
  }
  return courseNameInput.value.trim();
}

function setCourseNameValue(courseNameValue) {
  courseNameInput.value = "";
  pacificBranchSelect.value = "";
  pacificBranchCustomInput.value = "";
  pacificBranchCustomWrap.style.display = "none";
  yokohamaCourseSelect.value = "";
  yokohamaCourseCustomInput.value = "";
  yokohamaCourseCustomWrap.style.display = "none";
  if (courseSelect.value === PACIFIC_CLUB_NAME) {
    const presetBranches = Array.from(pacificBranchSelect.options).map(o => o.value);
    if (courseNameValue && presetBranches.includes(courseNameValue)) {
      pacificBranchSelect.value = courseNameValue;
    } else if (courseNameValue) {
      pacificBranchSelect.value = "__custom__";
      pacificBranchCustomInput.value = courseNameValue;
      pacificBranchCustomWrap.style.display = "block";
    }
  } else if (courseSelect.value === YOKOHAMA_CC_NAME) {
    const presetCourses = Array.from(yokohamaCourseSelect.options).map(o => o.value);
    if (courseNameValue && presetCourses.includes(courseNameValue)) {
      yokohamaCourseSelect.value = courseNameValue;
    } else if (courseNameValue) {
      yokohamaCourseSelect.value = "__custom__";
      yokohamaCourseCustomInput.value = courseNameValue;
      yokohamaCourseCustomWrap.style.display = "block";
    }
  } else {
    courseNameInput.value = courseNameValue || "";
  }
}

function getStartNineValue() {
  if (startNineSelect.value === "__custom__") {
    return startNineCustomInput.value.trim();
  }
  return startNineSelect.value;
}

function setStartNineValue(startNineValue) {
  const presetValues = Array.from(startNineSelect.options).map(o => o.value);
  if (startNineValue && presetValues.includes(startNineValue)) {
    startNineSelect.value = startNineValue;
    startNineCustomWrap.style.display = "none";
    startNineCustomInput.value = "";
  } else if (startNineValue) {
    startNineSelect.value = "__custom__";
    startNineCustomInput.value = startNineValue;
    startNineCustomWrap.style.display = "block";
  } else {
    startNineSelect.value = "";
    startNineCustomInput.value = "";
    startNineCustomWrap.style.display = "none";
  }
}

startNineSelect.addEventListener("change", () => {
  startNineCustomWrap.style.display = startNineSelect.value === "__custom__" ? "block" : "none";
});

document.querySelectorAll("#courseFilterRow .filter-chip").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#courseFilterRow .filter-chip").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCourseFilter = btn.dataset.course;
    render();
  });
});

// ---- Google カレンダー連携 ----
const GOOGLE_CLIENT_ID = "477050098248-osleutait6uvk1a7b14npjtjohdiu0q2.apps.googleusercontent.com";
const GOOGLE_SCOPE = "https://www.googleapis.com/auth/calendar.events";
const GCAL_ROUND_HOURS = 6; // ゴルフ1ラウンドの想定所要時間（カレンダー表示用）
let gcalToken = null;
let gcalTokenClient = null;

function updateGcalStatusUI() {
  const statusEl = document.getElementById("gcalStatus");
  const connectBtn = document.getElementById("gcalConnectBtn");
  const syncBtn = document.getElementById("gcalSyncBtn");
  const saveBtn = document.getElementById("saveBtn");
  const connectRequiredNote = document.getElementById("connectRequiredNote");
  if (gcalToken) {
    statusEl.textContent = "Googleカレンダーに接続済みです";
    statusEl.classList.add("connected");
    connectBtn.textContent = "再接続する";
    syncBtn.style.display = "inline-block";
    saveBtn.disabled = false;
    connectRequiredNote.style.display = "none";
  } else {
    statusEl.textContent = "未接続です（予約の自動反映にはGoogleカレンダーへの接続が必要です）";
    statusEl.classList.remove("connected");
    connectBtn.textContent = "Googleカレンダーに接続";
    syncBtn.style.display = "none";
    saveBtn.disabled = true;
    connectRequiredNote.style.display = "block";
  }
}

function initGoogleAuth() {
  if (typeof google === "undefined" || !google.accounts) {
    setTimeout(initGoogleAuth, 300);
    return;
  }
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPE,
    callback: (resp) => {
      if (resp.error) {
        alert("Googleカレンダーへの接続に失敗しました: " + resp.error);
        return;
      }
      gcalToken = resp.access_token;
      updateGcalStatusUI();
      syncFromCalendar();
    }
  });
}

function playersLine(r) {
  const players = (r.players || [r.companions || ""]).filter(n => n && n.trim());
  return players.length ? players.join("、") : "なし";
}

function toEventResource(r) {
  const startDateTime = `${r.playDate}T${r.startTime}:00`;
  const end = new Date(`${r.playDate}T${r.startTime}:00`);
  end.setHours(end.getHours() + GCAL_ROUND_HOURS);
  const pad = n => String(n).padStart(2, "0");
  const endDateTime = `${end.getFullYear()}-${pad(end.getMonth() + 1)}-${pad(end.getDate())}T${pad(end.getHours())}:${pad(end.getMinutes())}:00`;
  const courseName = r.course && r.course.trim() ? r.course.trim() : "ゴルフ場未設定";
  const summaryParts = [courseName];
  if (r.courseName && r.courseName.trim()) summaryParts.push(r.courseName.trim());
  if (r.startNine) summaryParts.push(r.startNine);
  let description = `ゴルフ場: ${courseName}`;
  description += `\nコース名: ${r.courseName && r.courseName.trim() ? r.courseName.trim() : "なし"}`;
  description += `\nスタート: ${r.startNine || "未設定"}`;
  description += `\nキャディ: ${r.caddieType || "未設定"}`;
  description += `\nプレーヤー: ${playersLine(r)}`;
  description += `\n組み合わせ枠: ${r.comboSlot ? "あり" : "なし"}`;
  if (r.timeChangeRequested) {
    description += `\n時間変更依頼: ${r.timeChangeNote || "あり"}`;
  }
  return {
    summary: `${summaryParts.join(" ")} ${r.startTime}〜`,
    description,
    start: { dateTime: startDateTime, timeZone: "Asia/Tokyo" },
    end: { dateTime: endDateTime, timeZone: "Asia/Tokyo" },
    extendedProperties: { private: { checkmateccApp: "true" } }
  };
}

async function pushToCalendar(reservation) {
  if (!gcalToken) return reservation.gcalEventId || null;
  const event = toEventResource(reservation);
  const url = reservation.gcalEventId
    ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${reservation.gcalEventId}`
    : `https://www.googleapis.com/calendar/v3/calendars/primary/events`;
  const method = reservation.gcalEventId ? "PATCH" : "POST";
  try {
    const res = await fetch(url, {
      method,
      headers: {
        "Authorization": `Bearer ${gcalToken}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(event)
    });
    if (res.status === 401) {
      gcalToken = null;
      updateGcalStatusUI();
      return reservation.gcalEventId || null;
    }
    if (!res.ok) return reservation.gcalEventId || null;
    const data = await res.json();
    return data.id;
  } catch (e) {
    return reservation.gcalEventId || null;
  }
}

async function deleteFromCalendar(eventId) {
  if (!gcalToken || !eventId) return;
  try {
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${gcalToken}` }
    });
  } catch (e) {
    // 削除に失敗しても致命的ではないので無視
  }
}

function parseEventDescription(desc) {
  const lines = (desc || "").split("\n");
  let players = ["", "", ""];
  let timeChangeRequested = false;
  let timeChangeNote = "";
  let course = "";
  let courseName = "";
  let startNine = "";
  let caddieType = "";
  let comboSlot = false;
  lines.forEach(line => {
    if (line.startsWith("ゴルフ場: ")) {
      const val = line.replace("ゴルフ場: ", "").trim();
      course = val === "ゴルフ場未設定" ? "" : val;
    } else if (line.startsWith("コース名: ")) {
      const val = line.replace("コース名: ", "").trim();
      courseName = val === "なし" ? "" : val;
    } else if (line.startsWith("スタート: ")) {
      const val = line.replace("スタート: ", "").trim();
      startNine = val === "未設定" ? "" : val;
    } else if (line.startsWith("キャディ: ")) {
      const val = line.replace("キャディ: ", "").trim();
      caddieType = val === "未設定" ? "" : val;
    } else if (line.startsWith("プレーヤー: ")) {
      const val = line.replace("プレーヤー: ", "").trim();
      const names = val === "なし" ? [] : val.split("、");
      players = [names[0] || "", names[1] || "", names[2] || ""];
    } else if (line.startsWith("組み合わせ枠: ")) {
      comboSlot = line.replace("組み合わせ枠: ", "").trim() === "あり";
    } else if (line.startsWith("時間変更依頼: ")) {
      timeChangeRequested = true;
      timeChangeNote = line.replace("時間変更依頼: ", "").trim();
    }
  });
  return { course, courseName, startNine, caddieType, players, timeChangeRequested, timeChangeNote, comboSlot };
}

// Googleカレンダーを正として、ローカルの予約一覧をまるごと作り直す。
// 別の端末（iPhoneなど）で追加・変更された予約もここで反映される。
async function syncFromCalendar() {
  if (!gcalToken) return;
  const syncBtn = document.getElementById("gcalSyncBtn");
  const originalText = syncBtn.textContent;
  syncBtn.textContent = "同期中...";
  syncBtn.disabled = true;
  try {
    const timeMin = new Date();
    timeMin.setDate(timeMin.getDate() - 60);
    const timeMax = new Date();
    timeMax.setDate(timeMax.getDate() + 365);
    const params = new URLSearchParams({
      privateExtendedProperty: "checkmateccApp=true",
      timeMin: timeMin.toISOString(),
      timeMax: timeMax.toISOString(),
      singleEvents: "true",
      maxResults: "250"
    });
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`, {
      headers: { "Authorization": `Bearer ${gcalToken}` }
    });
    if (res.status === 401) {
      gcalToken = null;
      updateGcalStatusUI();
      return;
    }
    if (!res.ok) return;
    const data = await res.json();
    const remoteEvents = (data.items || []).filter(ev => ev.start && ev.start.dateTime);

    let list = loadReservations();
    const remoteIds = new Set();

    remoteEvents.forEach(ev => {
      remoteIds.add(ev.id);
      const remoteDate = ev.start.dateTime.slice(0, 10);
      const remoteTime = ev.start.dateTime.slice(11, 16);
      const parsed = parseEventDescription(ev.description);
      const existing = list.find(r => r.gcalEventId === ev.id);
      if (existing) {
        existing.playDate = remoteDate;
        existing.startTime = remoteTime;
        existing.course = parsed.course;
        existing.courseName = parsed.courseName;
        existing.startNine = parsed.startNine;
        existing.caddieType = parsed.caddieType;
        existing.players = parsed.players;
        existing.timeChangeRequested = parsed.timeChangeRequested;
        existing.timeChangeNote = parsed.timeChangeNote;
        existing.comboSlot = parsed.comboSlot;
      } else {
        list.push({
          id: uid(),
          gcalEventId: ev.id,
          playDate: remoteDate,
          startTime: remoteTime,
          course: parsed.course,
          courseName: parsed.courseName,
          startNine: parsed.startNine,
          caddieType: parsed.caddieType,
          players: parsed.players,
          timeChangeRequested: parsed.timeChangeRequested,
          timeChangeNote: parsed.timeChangeNote,
          comboSlot: parsed.comboSlot
        });
      }
    });

    // カレンダー側から削除された予約（取得範囲内）はローカルからも取り除く
    list = list.filter(r => !r.gcalEventId || remoteIds.has(r.gcalEventId));

    saveReservations(list);
    render();
  } finally {
    syncBtn.textContent = originalText;
    syncBtn.disabled = false;
  }
}

document.getElementById("gcalConnectBtn").addEventListener("click", () => {
  if (!gcalTokenClient) {
    alert("Google認証の準備中です。少し待ってからもう一度お試しください。");
    return;
  }
  gcalTokenClient.requestAccessToken({ prompt: gcalToken ? "" : "consent" });
});

document.getElementById("gcalSyncBtn").addEventListener("click", syncFromCalendar);
// ---- ここまで Google カレンダー連携 ----

function loadReservations() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch (e) {
    return [];
  }
}

function saveReservations(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const days = ["日", "月", "火", "水", "木", "金", "土"];
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

const timeChangeCheckbox = document.getElementById("timeChangeRequested");
const timeChangeNoteWrap = document.getElementById("timeChangeNoteWrap");
const comboSlotCheckbox = document.getElementById("comboSlot");
timeChangeCheckbox.addEventListener("change", () => {
  timeChangeNoteWrap.style.display = timeChangeCheckbox.checked ? "block" : "none";
});

document.getElementById("saveBtn").addEventListener("click", async () => {
  const course = getCourseValue();
  const courseName = getCourseNameValue();
  const playDate = document.getElementById("playDate").value;
  const startTime = document.getElementById("startTime").value;
  const startNine = getStartNineValue();
  const caddieType = caddieTypeSelect.value;
  const players = [
    document.getElementById("player1").value.trim(),
    document.getElementById("player2").value.trim(),
    document.getElementById("player3").value.trim()
  ];
  const timeChangeRequested = timeChangeCheckbox.checked;
  const timeChangeNote = document.getElementById("timeChangeNote").value.trim();
  const comboSlot = comboSlotCheckbox.checked;

  if (!gcalToken) {
    alert("Googleカレンダーに接続してから予約を追加・変更してください。");
    return;
  }
  if (!course) {
    alert("ゴルフ場を選択（または入力）してください。");
    return;
  }
  if (!playDate || !startTime) {
    alert("プレー日とスタート時間を入力してください。");
    return;
  }
  if (startTime < "05:00" || startTime > "15:00") {
    alert("スタート時間は5:00〜15:00の範囲で入力してください。");
    return;
  }

  const saveBtn = document.getElementById("saveBtn");
  const originalLabel = saveBtn.textContent;
  saveBtn.disabled = true;
  saveBtn.textContent = "保存中...";

  let list = loadReservations();
  let targetReservation;

  if (editingId) {
    list = list.map(r => {
      if (r.id !== editingId) return r;
      targetReservation = { ...r, course, courseName, playDate, startTime, startNine, caddieType, players, timeChangeRequested, timeChangeNote, comboSlot };
      return targetReservation;
    });
  } else {
    targetReservation = {
      id: uid(),
      course, courseName, playDate, startTime, startNine, caddieType, players, timeChangeRequested, timeChangeNote, comboSlot, gcalEventId: null
    };
    list.push(targetReservation);
  }

  const gcalEventId = await pushToCalendar(targetReservation);
  if (gcalEventId) {
    list = list.map(r => r.id === targetReservation.id ? { ...r, gcalEventId } : r);
  }

  saveReservations(list);
  saveBtn.disabled = false;
  resetForm();
  render();
});

document.getElementById("cancelBtn").addEventListener("click", resetForm);

document.getElementById("deleteBtn").addEventListener("click", async () => {
  if (!editingId) return;
  const idToDelete = editingId;
  await deleteReservation(idToDelete);
  if (!loadReservations().find(r => r.id === idToDelete)) {
    resetForm();
    render();
  }
});

function resetForm() {
  editingId = null;
  setCourseValue("");
  setCourseNameValue("");
  document.getElementById("playDate").value = "";
  document.getElementById("startTime").value = "";
  setStartNineValue("");
  caddieTypeSelect.value = "";
  document.getElementById("player1").value = "";
  document.getElementById("player2").value = "";
  document.getElementById("player3").value = "";
  timeChangeCheckbox.checked = false;
  document.getElementById("timeChangeNote").value = "";
  timeChangeNoteWrap.style.display = "none";
  comboSlotCheckbox.checked = false;
  document.getElementById("form-title").textContent = "予約を追加";
  document.getElementById("saveBtn").textContent = "追加する";
  document.getElementById("cancelBtn").style.display = "none";
  document.getElementById("deleteBtn").style.display = "none";
}

function startEdit(id) {
  const list = loadReservations();
  const r = list.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  setCourseValue(r.course || "");
  setCourseNameValue(r.courseName || "");
  document.getElementById("playDate").value = r.playDate;
  document.getElementById("startTime").value = r.startTime;
  setStartNineValue(r.startNine || "");
  caddieTypeSelect.value = r.caddieType || "";
  const players = r.players || [r.companions || "", "", ""];
  document.getElementById("player1").value = players[0] || "";
  document.getElementById("player2").value = players[1] || "";
  document.getElementById("player3").value = players[2] || "";
  timeChangeCheckbox.checked = !!r.timeChangeRequested;
  document.getElementById("timeChangeNote").value = r.timeChangeNote || "";
  timeChangeNoteWrap.style.display = r.timeChangeRequested ? "block" : "none";
  comboSlotCheckbox.checked = !!r.comboSlot;
  document.getElementById("form-title").textContent = "予約を変更";
  document.getElementById("saveBtn").textContent = "更新する";
  document.getElementById("cancelBtn").style.display = "inline-block";
  document.getElementById("deleteBtn").style.display = "inline-block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function deleteReservation(id) {
  if (!confirm("この予約を削除しますか？")) return;
  let list = loadReservations();
  const target = list.find(x => x.id === id);
  if (target && target.gcalEventId) {
    await deleteFromCalendar(target.gcalEventId);
  }
  list = list.filter(x => x.id !== id);
  saveReservations(list);
  render();
}

document.getElementById("pastToggleBtn").addEventListener("click", () => {
  showPast = !showPast;
  document.getElementById("pastToggleBtn").textContent = showPast ? "今後の予約に戻す" : "過去の予約を表示";
  render();
});

const KNOWN_COURSES = ["横浜CC", "チェックメイトCC", "太平洋クラブ"];

function render() {
  let list = loadReservations();
  list.sort((a, b) => (a.playDate + a.startTime).localeCompare(b.playDate + b.startTime));

  const today = todayStr();

  if (showPast) {
    list = list.filter(r => r.playDate < today);
    list.reverse();
  } else {
    list = list.filter(r => r.playDate >= today);
  }

  if (currentCourseFilter === "__other__") {
    list = list.filter(r => r.course && !KNOWN_COURSES.includes(r.course));
  } else if (currentCourseFilter) {
    list = list.filter(r => r.course === currentCourseFilter);
  }

  const container = document.getElementById("resList");
  const emptyMsg = document.getElementById("emptyMsg");
  container.innerHTML = "";

  if (list.length === 0) {
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";

  list.forEach(r => {
    const item = document.createElement("div");
    item.className = "res-item" + (!showPast && r.playDate < today ? " past" : "");

    const main = document.createElement("div");
    main.className = "res-main";

    const dateLine = document.createElement("div");
    dateLine.className = "date-line";
    if (r.course) {
      const courseTag = document.createElement("span");
      courseTag.className = "course-tag";
      courseTag.textContent = r.courseName ? `${r.course}（${r.courseName}）` : r.course;
      dateLine.appendChild(courseTag);
    }
    let dateText = `${formatDateLabel(r.playDate)} ${r.startTime}〜`;
    if (r.startNine) dateText += `（${r.startNine}）`;
    dateLine.appendChild(document.createTextNode(dateText));
    if (r.timeChangeRequested) {
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = "変更依頼あり";
      dateLine.appendChild(badge);
    }
    if (r.comboSlot) {
      const comboBadge = document.createElement("span");
      comboBadge.className = "badge";
      comboBadge.textContent = "組み合わせ枠";
      dateLine.appendChild(comboBadge);
    }
    if (r.gcalEventId) {
      const tag = document.createElement("span");
      tag.className = "sync-tag";
      tag.textContent = "カレンダー同期済み";
      dateLine.appendChild(tag);
    }

    const subLine = document.createElement("div");
    subLine.className = "sub-line";
    const playerNames = (r.players || [r.companions || ""]).filter(n => n && n.trim());
    let subText = r.caddieType ? `${r.caddieType}` : "";
    subText += subText ? "　／　" : "";
    subText += playerNames.length ? `同伴者: ${playerNames.join("、")}` : "同伴者: なし";
    if (r.timeChangeRequested && r.timeChangeNote) {
      subText += `　／　${r.timeChangeNote}`;
    }
    subLine.textContent = subText;

    main.appendChild(dateLine);
    main.appendChild(subLine);

    const actions = document.createElement("div");
    actions.className = "res-actions";

    const editBtn = document.createElement("button");
    editBtn.className = "icon-btn";
    editBtn.textContent = "変更";
    editBtn.addEventListener("click", () => startEdit(r.id));

    actions.appendChild(editBtn);

    item.appendChild(main);
    item.appendChild(actions);
    container.appendChild(item);
  });
}

updateCourseNameUI();
updateGcalStatusUI();
initGoogleAuth();
render();
